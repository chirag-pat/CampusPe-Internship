[pytest]
# pytest.ini — Tool-04 AI Service test configuration
# Run from ai-service/ directory: pytest -v

testpaths   = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short traceback and suppress noisy warnings from third-party libs
addopts = -v --tb=short -W ignore::DeprecationWarning
